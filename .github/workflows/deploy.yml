name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # 1. Install pnpm
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # Specify your desired pnpm version here

      # 2. Set up Node with pnpm caching
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm' # Changed from 'npm' to 'pnpm'

      # 3. Install dependencies using pnpm
      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. Build project using pnpm
      - name: 🔨 Build project
        run: pnpm run build

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4